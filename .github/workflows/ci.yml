name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Testes, build e lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # necessário para o SonarCloud

      - name: Instalar Rust estável + target WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt, llvm-tools

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Formatação
        run: cargo fmt --check

      - name: Clippy (capiba-prompts + capiba-mcp)
        run: cargo clippy -p capiba-prompts -p capiba-mcp -- -D warnings

      - name: Instalar cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Testes com cobertura (capiba-mcp)
        run: |
          mkdir -p coverage
          cargo llvm-cov -p capiba-mcp --lcov --output-path coverage/lcov.info

      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build extensão Zed (WASM)
        run: cargo build --target wasm32-wasip1 -p capiba-zed
